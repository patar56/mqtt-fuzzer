# ============================================================
# HARDENED MOSQUITTO ACL FILE
# UCLA ECE 202C — IoT Security Final Project
# Campaign 3 — Topic-Level Access Control Mitigations
# ============================================================
# This ACL file enforces the principle of least privilege for
# all MQTT topics. It addresses:
#   V1  — Unauthorized Will Message Exploitation
#   V2  — Retained Message Poisoning
#   V4  — Wildcard Subscription Eavesdropping
#   V6  — $SYS Topic Information Disclosure
#   V9  — Shared Subscription Namespace Abuse
#   V17 — Broker Configuration Fingerprinting
#
# Mosquitto ACL format:
#   topic [read|write|readwrite|deny] <filter>
#   user <username>
#   pattern [read|write|readwrite] <pattern>
#
# Rules are evaluated top-to-bottom, first match wins.
# Without an explicit 'allow', all access is DENIED by default
# when acl_file is set.
# ============================================================

# ── Broker Admin User ─────────────────────────────────────────
# Full access for the authenticated administrator.
# Create with: mosquitto_passwd /mosquitto/config/passwd admin
user admin
topic readwrite #

# ── $SYS Topic Restrictions (V6, V17 mitigations) ────────────
# Deny ALL clients access to $SYS topics by default.
# This prevents version fingerprinting (V17) and broker internals
# disclosure (V6). Only the admin user (above) may read $SYS.
#
# The deny pattern must appear BEFORE any wildcard grants.
topic deny $SYS/#

# ── $share Shared Subscription Restrictions (V9 mitigation) ──
# Deny malformed or empty-group shared subscriptions.
# Patterns with empty group names ($share//topic) and wrong-case
# ($SHARE/group/topic) are caught here.
topic deny $share/#
topic deny $SHARE/#

# ── Device Namespace — Authenticated Devices Only ─────────────
# Devices must authenticate (see passwd file).
# Each device gets read/write only on its own subtree.
# Pattern uses %c (client ID) for per-device isolation.
#
# Sensor devices: publish sensor readings, read commands
user sensor_device
topic write sensors/%c/#
topic read  commands/%c/#

# Actuator devices: read commands for their ID, publish status
user actuator_device
topic read  commands/%c/#
topic write status/%c/#
topic write actuators/%c/telemetry

# ── Application/Backend User ──────────────────────────────────
user backend_app
topic read  sensors/#
topic write commands/#
topic read  status/#
topic read  actuators/#

# ── Monitoring User (read-only, no $SYS) ─────────────────────
user monitor
topic read sensors/#
topic read status/#

# ── Will Message Restrictions (V1 mitigation) ─────────────────
# Mosquitto does not have a native "deny will topic" directive
# separate from the publish ACL. The Will topic is checked against
# the publishing ACL at CONNECT time.
# Effect: if a client cannot write to admin/control (below), its
# CONNECT with will_topic=admin/control is REJECTED outright.
#
# The following explicit deny prevents any non-admin user from
# publishing (including via Will) to administrative topics:
topic deny admin/#
topic deny commands/all
topic deny alerts/system

# ── Retained Message Topic Restrictions (V2 mitigation) ──────
# Retained messages are controlled by the write ACL on each topic.
# By restricting write access to device-specific topics (via
# user/pattern rules above), an anonymous or low-privilege client
# cannot set retained messages on sensitive topics.
#
# Additional explicit denies for high-value retained targets:
topic deny devices/#
topic deny config/#
topic deny firmware/#

# ── Wildcard Subscription Denial (V4 mitigation) ──────────────
# Deny the global '#' and broad '+' wildcard subscriptions to
# non-admin users. This prevents unauthenticated or low-privilege
# clients from eavesdropping on all traffic.
topic deny #
# Note: '+' by itself is also invalid per MQTT spec (must be
# anchored: +/topic or topic/+). Mosquitto rejects bare '+'.

# ── Anonymous User Fallback ───────────────────────────────────
# With allow_anonymous false in mosquitto_hardened.conf, this
# section is never reached for unauthenticated clients.
# Included as defense-in-depth in case allow_anonymous is
# accidentally re-enabled:
#
# (no 'user' directive = applies to all users not matched above)
# Deny everything not explicitly allowed
# topic deny #     ← implicit when no match found
