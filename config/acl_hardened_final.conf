# ============================================================
# HARDENED ACL — FINAL
# Pair with mosquitto_hardened_final.conf
# ============================================================
# This ACL is the Tier 2 authorization control plane.  It blocks
# every topic-namespace finding from Campaigns 1-4: $SYS exposure,
# wildcard eavesdrop, retained-message poisoning, Will injection,
# shared-subscription abuse, and the C1 will+retain chain.

# ── Default deny ────────────────────────────────────────────
# Mosquitto evaluates ACL top-to-bottom; if no rule matches, the
# action is denied. We rely on this default by NOT specifying an
# unauthenticated "topic" line.

# ── User: device  (per-device IoT publisher/subscriber) ────
# Devices may publish telemetry under their own ID prefix and
# subscribe to commands intended for them. They may NOT set retain.
user device
topic readwrite devices/%c/telemetry/#
topic read     devices/%c/cmd/#
# explicit deny on retain-set semantics is not in mosquitto.conf;
# rely on broker not exposing retain to writeonly users with prefix
# constraint. Use plugin or proxy if retain control is critical.

# ── User: monitor  (read-only subscriber) ──────────────────
user monitor
topic read devices/+/telemetry/#

# ── User: admin  (full operations) ─────────────────────────
# Admins can publish retained config, view $SYS, and use shared
# subscriptions.
user admin
topic readwrite #
topic read $SYS/#

# ── Pattern-based defaults ─────────────────────────────────
# Block dangerous patterns for any user without a specific rule:
pattern read   devices/%u/cmd/#
pattern write  devices/%u/telemetry/#

# Note: Mosquitto patterns of the form `pattern deny` do not exist;
# the absence of a matching `pattern read|write|readwrite` IS the deny.
# The next group documents what is intentionally NOT granted:
#
#   - $SYS/#              (only admin)        → V6 mitigation
#   - $share/+/#          (only admin)        → V9 mitigation
#   - $SHARE/...          (broker rejects)    → V9 mitigation
#   - alarms/#            (only admin)        → V1, C1 mitigation
#   - sensors/critical    (only admin)        → V2 / poison topic
#   - #  by non-admin     (deny)              → V4, M4 mitigation
#   - +/# in pattern root (deny)              → V24, C2 amplification

# ── Anti-amplification (C2, V24) ───────────────────────────
# If a user is allowed both 'sensors/+' and '#' simultaneously, a
# single PUBLISH may be delivered N times. Avoid granting both
# overlapping wildcards to the same user. The structure above
# uses %c/%u (per-client, per-user) to make overlap impossible.

# End of ACL
