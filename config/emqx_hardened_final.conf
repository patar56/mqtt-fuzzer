# ============================================================
# HARDENED EMQX 5.x CONFIGURATION — FINAL
# UCLA ECE 202C — IoT Security Final Project
# Patrick Argento — 2026-05-09
# EMQX uses HOCON config (emqx.conf, etc/emqx.conf).
#
# This file targets every EMQX-specific finding from the Final
# Campaign as well as cross-broker findings:
#   - Q5: EMQX accepts PID=0 in PUBACK/PUBREC/PUBREL/PUBCOMP
#   - C2: EMQX delivers 3 copies via overlapping subscriptions
#   - V52: SessionExpiry=∞ accepted (memory pressure)
#   - V53: 100 UserProperty entries accepted
#   - M4 mitigated by EMQX's built-in authz (already strict)
# ============================================================

# ── Tier 1: Authentication (V1, V8) ─────────────────────────
authentication = [
    {
        mechanism = "password_based"
        backend = "built_in_database"
        password_hash_algorithm { name = "sha256" }
        user_id_type = "username"
    }
]

# Default ACL: deny everything not explicitly permitted
authorization {
    no_match = "deny"
    deny_action = "disconnect"
    cache { enable = true }
    sources = [
        { type = "file"; path = "etc/acl_hardened_final.conf" }
    ]
}

# ── Tier 2: ACL (etc/acl_hardened_final.conf, EMQX format) ──
# {allow,  {username, "admin"}, all,        ["#"]}.
# {allow,  {username, "device"},  publish,  ["devices/${username}/telemetry/#"]}.
# {allow,  {username, "device"},  subscribe,["devices/${username}/cmd/#"]}.
# {allow,  {username, "monitor"}, subscribe,["devices/+/telemetry/#"]}.
# {deny,   all,                    subscribe,["#", "$SYS/#", "$share/#", "$SHARE/#"]}.
# {deny,   all,                    publish,  ["alarms/#", "$SYS/#"]}.
# {deny,   all,                    all,       ["#"]}.

# ── Tier 3: MQTT-level resource & state machine controls ────
mqtt {
    # Q5 — strict_mode rejects packets violating §2.3.1 such as PID=0
    # The Final-campaign Q5 result confirms EMQX 5.0.0 does NOT enforce
    # this by default; flipping strict_mode to true is the fix.
    strict_mode = true

    # V18, V20 — packet size cap
    max_packet_size = 64KB

    # V11, R1, Q3 — bound concurrent QoS state and inflight QoS 1/2
    max_inflight = 10
    max_awaiting_rel = 32
    await_rel_timeout = 30s
    max_qos_allowed = 2
    upgrade_qos = false

    # V19 — limit number of subscriptions per client
    max_subscriptions = 20
    max_topic_levels = 10
    max_topic_alias = 8           # V51 — bound topic-alias map

    # V52 — bound session expiry interval (was 0xFFFFFFFF accepted)
    max_session_expiry_interval = 7200s    # 2 hours

    # V53 — bound MQTT v5 user properties size
    max_user_properties = 16

    # R3 — keepalive enforcement
    keepalive_backoff = 0.75               # disconnect at 0.75x

    # V21, V11 — idle / mqueue limits
    max_mqueue_len = 100
    mqueue_default_priority = lowest

    # V31 — explicit handling of session takeover collisions
    use_username_as_clientid = false
    session_takeover = "allow_with_disconnect"
    # The third option ("disallow") is stricter; choose based on use case.

    # V20 — inbound message rate (additional throttle, EMQX-specific)
    pub_rate_limit = "1000/s"
    sub_rate_limit = "100/s"
}

# ── Tier 4: Listener-level controls (V18, V20, R3) ─────────
listeners.tcp.default {
    enable = false                       # plain TCP off
}

listeners.ssl.default {
    bind = "0.0.0.0:8883"
    max_connections = 100
    max_conn_rate = 50                   # connections/sec/source
    messages_rate = "1000/s,10000/s"     # bucket / overall
    bytes_rate    = "1MB/s,10MB/s"

    # mTLS recommended in production:
    # ssl_options {
    #   cacertfile = "/etc/emqx/certs/ca.crt"
    #   certfile   = "/etc/emqx/certs/server.crt"
    #   keyfile    = "/etc/emqx/certs/server.key"
    #   verify     = "verify_peer"
    #   fail_if_no_peer_cert = true
    #   versions   = ["tlsv1.3"]
    # }
}

listeners.ws.default { enable = false }
listeners.wss.default { enable = false }
listeners.quic.default { enable = false }

# ── Dashboard & API hardening (V17 fingerprinting surface) ──
dashboard {
    listeners.http  { enable = false }
    listeners.https {
        bind = "0.0.0.0:18084"
        # ssl_options { ... }
    }
    default_username = ""        # disable default credentials
}

# ── Logging ─────────────────────────────────────────────────
log.console_handler.level = warning
log.file_handlers.default {
    enable = true
    level  = info
    file   = "log/emqx.log"
    rotation { count = 10; size = 50MB }
    formatter = json
}

# ── Cluster & broker discovery ──────────────────────────────
cluster.discovery_strategy = manual

# End of file
