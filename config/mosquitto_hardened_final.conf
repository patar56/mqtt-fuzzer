# ============================================================
# HARDENED MOSQUITTO CONFIGURATION — FINAL
# UCLA ECE 202C — IoT Security Final Project
# Patrick Argento — 2026-05-09
# Final-campaign mitigation set covering V1, V2, V3, V4, V6,
# V8, V9, V11, V17, V18, V19, V20, V21, V22, V24, V26, V27,
# V28, V31 plus C1/C2 attack chains.
# ============================================================

# ── Network ────────────────────────────────────────────────
listener 8883
protocol mqtt
# TLS-only (mTLS recommended for IoT) — uncomment in production:
# cafile      /mosquitto/certs/ca.crt
# certfile    /mosquitto/certs/server.crt
# keyfile     /mosquitto/certs/server.key
# require_certificate true
# tls_version tlsv1.3

# REMOVED: Plain MQTT and WebSocket listeners (V17 fingerprinting
# surface, V20/V21 unrestricted PUBLISH/PINGREQ flooding).

# ── Tier 1: Authentication (V1, V2, V3, V8) ────────────────
# Anonymous clients are the entry point for every Will-injection,
# retain-poisoning, and ClientID-hijack attack confirmed across
# campaigns 1-4. Disabling them collapses the attack surface.
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Tier 2: Authorization (V1, V2, V4, V6, V9, V24, V28) ───
# All topic-level controls live in acl_hardened_final.conf.
# Rules:
#   - Per-username topic prefixes (no '#' wildcard reads from the
#     pattern level, no shared subscriptions for non-admins)
#   - Deny PUBLISH retain on non-config/* topics (V2 + C1)
#   - Deny PUBLISH on alarms/* unless authorized (V1 chain)
#   - Deny SUBSCRIBE on $SYS/* (V6) and $share/* for non-admins
#   - Deny SUBSCRIBE on '#' or '/+' wildcards at pattern root
acl_file /mosquitto/config/acl_hardened_final.conf

# ── Tier 3: Resource controls (V11, V18, V19, V20, V21) ────

# Cap concurrent connections to limit the connection-flood impact
# (Campaign 2: 783 connect/sec accepted; Campaign 3: 50/50 accepted).
max_connections 50

# Hard cap on packet size (V18 oversized CONNECT, V20 large PUBLISH).
# 64 KB covers normal IoT payloads and blocks the 10 MB attack.
message_size_limit 65536

# Limit in-flight QoS 1/2 PUBLISH per client (V11; throttles V20).
max_inflight_messages 10

# Limit queued messages for offline persistent-session clients
# (V11 — campaign 2 stored 5000 messages across 50 sessions).
max_queued_messages 20
queue_qos0_messages false

# Bound zombie persistent sessions (V11; complements V31 mitigation).
persistent_client_expiration 1h

# Limit retained-message storage growth (V2; campaign 2 stored
# 500 retained messages with no cap).
# Mosquitto 2.0 has no native ceiling — enforce via ACL by
# restricting the set of users who may set retain=true.

# ── Tier 4: Network controls (recommended sidecar rules) ──
# Mosquitto 2.0 does not have native rate limiting per connection.
# Deploy these iptables rules on the broker host:
#
#   # Cap NEW connections to 10/sec/source IP
#   iptables -I INPUT -p tcp --dport 8883 \
#     -m connlimit --connlimit-above 10 --connlimit-mask 32 -j REJECT
#
#   # Throttle inbound packets to 5,000/sec/source IP (V20 mitigation)
#   iptables -A INPUT -p tcp --dport 8883 \
#     -m hashlimit --hashlimit-name mqtt --hashlimit-above 5000/sec \
#     --hashlimit-mode srcip -j DROP
#
# The V20 finding (104,931 PUBLISH/sec single connection) cannot
# be fully mitigated inside Mosquitto 2.0 — network layer is mandatory.

# ── Keepalive and timing (V21, V27) ─────────────────────────
# Mosquitto enforces keepalive at 1.5x.  R3 finding (Final
# campaign) confirms Mosquitto delays disconnect at the
# millisecond granularity. Compensate with a smaller default:
keepalive_interval 30

# ── QoS state machine note (V10/Q5) ─────────────────────────
# Mosquitto already drops QoS-flow PID=0 at parse time.  EMQX
# does not (Q5 confirmed). For Mosquitto, no additional config
# is needed; for EMQX, see emqx_hardened_final.conf.

# ── Logging (audit trail) ───────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
connection_messages true

# ── Persistence & $SYS ─────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
retained_persistence true       # required for legitimate retained use
sys_interval 0                   # disables broker-fingerprinting via
                                  # $SYS/broker/version (V6, V17)

# ── Bridges and shared subscriptions (V9) ───────────────────
# The Mosquitto built-in shared subscription parser tolerates the
# $SHARE/ uppercase variant and empty group name. ACL rejects
# subscriptions matching ^\$share/ unless explicitly allowed.

# End of file
