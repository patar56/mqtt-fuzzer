# ============================================================
# HARDENED NanoMQ CONFIGURATION — FINAL
# UCLA ECE 202C — IoT Security Final Project
# Patrick Argento — 2026-05-09
#
# NanoMQ uses HOCON-style config (nanomq.conf v0.20+).
# Mitigations target NanoMQ-specific findings:
#   - R1   QoS 2 dedup race (2 copies delivered) — TUNE inflight
#   - C2   amplification (4 copies via overlapping subs)
#   - M4   '#' wildcard receives all topics
#   - V21  PINGREQ-only keepalive abuse
#   - R3   keepalive enforcement gap
#   - V11  unbounded session growth
#
# NOTE: NanoMQ does NOT persist retained messages by default
# (M3 finding). This is a design choice — re-enable only if needed
# and combined with ACL.
# ============================================================

# ── Listeners ──────────────────────────────────────────────
mqtt {
    property_size = 32
    max_packet_size = 64KB         # V18, V20 mitigation
    max_mqueue_len = 256           # V11 — bound queue per session
    retry_interval = 10
    keepalive_multiplier = 1.25    # R3 — tighten keepalive grace
    max_inflight_window = 10       # R1 — bound concurrent QoS2
    max_inflight_QoS2 = 8          # R1 — explicit QoS 2 limit
    max_awaiting_rel = 8           # Q3 — limit unacked PUBREL
    await_rel_timeout = 30
}

listeners.tcp {
    bind = "0.0.0.0:8883"           # TLS-only port; plain mqtt removed
    enable = true
    # max_connections = 200
    # nodelay = true
}

# Plain MQTT listener disabled (V17 fingerprint surface)
# listeners.tcp.default { ... }

# ── Tier 1: Authentication (V1, V8) ─────────────────────────
auth {
    allow_anonymous = false
    no_match = deny

    password = {
        include "/etc/nanomq/pwd.conf"
    }
}

# ── Tier 2: Authorization (V4, V6, V9, V24, M4) ────────────
auth.acl {
    enable = true
    cache = true
    rules = [
      # Admin: full access
      { permit = "allow", username = "admin", action = "pubsub", topics = ["#"] },

      # Devices: only their own subtree, no retain
      { permit = "allow", username = "device", action = "pubsub",
        topics = ["devices/${username}/+"] },

      # Monitors: read-only on telemetry
      { permit = "allow", username = "monitor", action = "subscribe",
        topics = ["devices/+/telemetry/#"] },

      # Block '#' wildcard at root for everyone but admin (M4 fix)
      { permit = "deny",  action = "subscribe", topics = ["#", "$SYS/#"] },

      # Block shared-subscription namespace abuse (V9)
      { permit = "deny",  action = "subscribe",
        topics = ["$share/+/#", "$SHARE/+/#"] },

      # Block known sensitive Will-injection targets (V1, C1)
      { permit = "deny",  action = "publish",
        topics = ["alarms/#", "sensors/critical", "$SYS/#"] },

      # Default deny
      { permit = "deny",  action = "pubsub", topics = ["#"] }
    ]
}

# ── Tier 3: Resource limits (V11, V19, V20, V21, R1) ───────
sqlite {
    disk_cache_size = 4096
    mounted_file_path = "/tmp/"
    flush_mem_threshold = 100
    resend_interval = 5000
}

# Connection rate limiting at broker level (NanoMQ 0.20+ supports this)
http_server {
    enable = false                  # V17 — disable HTTP API surface
}

# WebSocket and TLS listeners explicitly off unless needed
listeners.ws { enable = false }

# ── Retained messages (M3) ─────────────────────────────────
# NanoMQ default: retain-not-persisted. We keep it that way.
# Pair with ACL above to ensure retain semantics cannot be abused
# even if persistence is later re-enabled.

# ── Logging ────────────────────────────────────────────────
log {
    to = [file]
    level = warn
    dir = "/var/log/nanomq"
    file = "nanomq.log"
    rotation { size = 10MB; count = 5 }
}

# End of file
