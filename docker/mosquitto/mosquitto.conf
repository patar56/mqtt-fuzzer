# Mosquitto Configuration - Intentionally permissive for security research
# This configuration enables features that expose known vulnerability classes

# Network
listener 1883
protocol mqtt

# WebSocket listener for additional attack surface
listener 9001
protocol websockets

# Allow anonymous access (required for ClientID hijacking tests)
allow_anonymous true

# Logging - verbose for monitoring
log_dest stdout
log_type all
log_timestamp true

# Persistence (enables retained message attacks)
persistence true
persistence_location /mosquitto/data/

# Session expiry - enables session takeover tests
# persistent_client_expiration 1h

# Max connections (test DoS resistance)
max_connections 200

# Will message delay (enables Will message timing attacks)
# will_delay_interval 0

# Retained message storage (enables unauthorized retained message tests)
retained_persistence true

# QoS 2 message handling
max_inflight_messages 20
max_queued_messages 100

# Topic restrictions - NONE (allows topic auth bypass tests)
# acl_file /mosquitto/config/acl.conf
